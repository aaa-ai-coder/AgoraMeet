name: Build APK
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., v3.0.0)'
        required: true
        default: 'v3.0.0'
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Install Android SDK
        uses: android-actions/setup-android@v2
      - name: Install dependencies
        run: npm install
      - name: Build App1 APK
        run: python3 build_apk.py com.agorameet.app && cp android/app/build/outputs/apk/release/app-release.apk AgoraMeet-v3.0.0.apk
      - name: Build App2 APK
        run: python3 build_apk.py com.agorameet.app2 && cp android/app/build/outputs/apk/release/app-release.apk AgoraMeet2-v3.0.0.apk
      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.version || 'v3.0.0' }}
          name: AgoraMeet v3.0.0
          body: |
            ## AgoraMeet v3.0.0
            - Cloudflare Worker backend
            - Multi-provider AI chat (NaraRouter, Groq, Mistral, SiliconFlow, Arcee, Cerebras)
            - LiveKit AI Voice Call
            - Speech-to-Text (STT) / Text-to-Speech (TTS)
            - LinkPreview cards in chat
            - B2 secure download links
          files: |
            AgoraMeet-v3.0.0.apk
            AgoraMeet2-v3.0.0.apk