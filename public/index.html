<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
  <title>AgoraMeet</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="icon.svg">
</head>
<body>

  <!-- App container -->
  <div id="app">

    <!-- LOGIN SCREEN -->
    <section id="loginScreen" class="screen active">
      <div class="auth-wrap">
        <div class="brand">
          <div class="brand-logo"><img src="icon.svg" width="40" height="40" alt="logo"></div>
          <h1>AgoraMeet</h1>
          <p class="sub">Connect with anyone, anywhere.</p>
        </div>
        <div id="phoneStep">
          <label>Phone number</label>
          <div class="phone-row">
            <span class="cc">+88</span>
            <input id="phoneInput" type="tel" placeholder="01XXXXXXXXX" autocomplete="off">
          </div>
          <button id="sendOtpBtn" class="btn-primary">Continue</button>
          <button id="googleBtn" class="btn-google"><i class="fa-brands fa-google"></i> Continue with Google</button>
          <p class="alt-link" id="useEmailLink">Use email instead</p>
        </div>
        <div id="otpStep" class="hidden">
          <label>Enter the 6-digit code</label>
          <input id="otpInput" type="text" inputmode="numeric" maxlength="6" placeholder="••••••" autocomplete="off">
          <button id="verifyOtpBtn" class="btn-primary">Verify</button>
          <p class="alt-link" id="resendLink">Resend code</p>
        </div>
        <div id="emailStep" class="hidden">
          <label>Email</label>
          <input id="emailInput" type="email" placeholder="you@email.com" autocomplete="off">
          <label>Password</label>
          <input id="passwordInput" type="password" placeholder="••••••••" autocomplete="off">
          <button id="emailBtn" class="btn-primary">Sign in</button>
          <p class="alt-link" id="usePhoneLink">Use phone instead</p>
        </div>
        <p id="authError" class="error hidden"></p>
        <div id="recaptcha"></div>
      </div>
    </section>

    <!-- MAIN APP -->
    <section id="mainScreen" class="screen">
      <!-- Header -->
      <header class="topbar">
        <div class="topbar-title"><img src="icon.svg" width="26" height="26" style="vertical-align:-6px;margin-right:8px;border-radius:7px">AgoraMeet</div>
        <div class="topbar-actions">
          <button id="newChatBtn" title="New chat"><i class="fa-solid fa-pen-to-square"></i></button>
          <button id="logoutBtn" title="Logout"><i class="fa-solid fa-right-from-bracket"></i></button>
        </div>
      </header>

      <div class="main-body">
        <!-- Chats list -->
        <div id="chatsView" class="view active">
          <div class="search"><i class="fa-solid fa-magnifying-glass"></i><input id="searchInput" placeholder="Search"></div>
          <div id="chatList" class="chat-list"></div>
        </div>

        <!-- Conversation -->
        <div id="conversationView" class="view">
          <div class="conv-header">
            <button id="backBtn"><i class="fa-solid fa-arrow-left"></i></button>
            <div class="conv-avatar" id="convAvatar">?</div>
            <div class="conv-meta">
              <div class="conv-name" id="convName">Name</div>
              <div class="conv-status" id="convStatus">online</div>
            </div>
            <div class="conv-actions">
              <button id="callVoiceBtn" title="Voice call"><i class="fa-solid fa-phone"></i></button>
              <button id="callVideoBtn" title="Video call"><i class="fa-solid fa-video"></i></button>
            </div>
          </div>
          <div id="messages" class="messages"></div>
          <div class="composer">
            <input id="msgInput" placeholder="Message" autocomplete="off">
            <button id="sendBtn"><i class="fa-solid fa-paper-plane"></i></button>
          </div>
        </div>

        <!-- New chat -->
        <div id="newChatView" class="view">
          <div class="conv-header">
            <button id="newBackBtn"><i class="fa-solid fa-arrow-left"></i></button>
            <div class="conv-name">New chat</div>
          </div>
          <div class="search"><i class="fa-solid fa-magnifying-glass"></i><input id="newSearchInput" placeholder="Find people by phone"></div>
          <div id="peopleList" class="chat-list"></div>
        </div>

        <!-- AI Assistant -->
        <div id="aiView" class="view">
          <div class="conv-header">
            <div class="conv-avatar" style="background:#00a884">AI</div>
            <div class="conv-meta">
              <div class="conv-name">AI Assistant</div>
              <div class="conv-status" id="aiStatus">ready</div>
            </div>
          </div>
          <div id="aiMessages" class="messages"></div>
          <div class="composer">
            <input id="aiInput" placeholder="Ask anything…" autocomplete="off">
            <button id="aiSendBtn"><i class="fa-solid fa-paper-plane"></i></button>
          </div>
        </div>
      </div>

      <!-- Bottom navigation -->
      <nav class="bottomnav">
        <button class="bn active" data-view="chatsView"><i class="fa-solid fa-comment"></i><span>Chats</span></button>
        <button class="bn" data-view="aiView"><i class="fa-solid fa-robot"></i><span>AI</span></button>
      </nav>
    </section>

    <!-- CALL SCREEN -->
    <section id="callScreen" class="screen">
      <div class="call-bg"></div>
      <div class="call-overlay">
        <div class="call-avatar" id="callAvatar">?</div>
        <div class="call-name" id="callName">Name</div>
        <div class="call-state" id="callState">Calling…</div>
        <div id="callVideoWrap" class="hidden">
          <video id="remoteVideo" autoplay playsinline></video>
          <video id="localVideo" autoplay playsinline muted></video>
        </div>
        <div class="call-controls">
          <button id="callMuteBtn" class="cc"><i class="fa-solid fa-microphone"></i></button>
          <button id="callEndBtn" class="cc cc-end"><i class="fa-solid fa-phone-slash"></i></button>
          <button id="callCamBtn" class="cc"><i class="fa-solid fa-video"></i></button>
        </div>
      </div>
    </section>

  </div>

  <div id="toast"></div>

  <!-- Firebase + Agora from CDN (app needs network for these services anyway) -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
